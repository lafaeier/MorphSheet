<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MorphSheet - 跨系统表格数据转换智能体</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- 三栏布局 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 class="sidebar-title">MorphSheet</h2>
      </div>
      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="history">历史记录</button>
        <button class="tab-btn" data-tab="skills">技能库</button>
      </div>
      <div class="sidebar-content">
        <div class="tab-panel active" id="panel-history">
          <p class="placeholder-text">暂无转换记录</p>
        </div>
        <div class="tab-panel" id="panel-skills">
          <p class="placeholder-text">暂无保存的技能</p>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <!-- 顶部操作栏 -->
      <div class="top-bar">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📂</div>
          <p>拖拽文件到此处，或点击选择</p>
          <p class="upload-hint">支持 .xlsx / .xls / .csv</p>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden>
        </div>
        <div class="target-selector">
          <label>目标格式：</label>
          <select id="targetFormat">
            <option value="">选择格式...</option>
            <option value="xlsx">.xlsx (Excel 2007+)</option>
            <option value="xls">.xls (Excel 97-2003)</option>
            <option value="csv">.csv (CSV)</option>
          </select>
          <select id="targetEncoding" style="display:none;">
            <option value="utf-8">UTF-8</option>
            <option value="gbk">GBK</option>
            <option value="gb2312">GB2312</option>
          </select>
        </div>
        <button class="btn-primary" id="btnConvert" disabled>开始转换</button>
      </div>

      <!-- 对话区 -->
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="message system">
            <div class="message-content">
              <p>欢迎使用 MorphSheet 👋</p>
              <p>请上传源数据文件，然后输入自然语言指令描述你需要的转换操作。</p>
            </div>
          </div>
        </div>
        <div class="chat-input">
          <input type="text" id="chatInput" placeholder="输入数据清洗指令，如：删除所有金额小于0的行..." disabled>
          <button id="btnSend" disabled>发送</button>
        </div>
      </div>

      <!-- Diff 视图 -->
      <div class="diff-container" id="diffContainer" style="display:none;">
        <div class="diff-header">
          <span>数据对比预览</span>
          <div class="diff-actions">
            <button class="btn-primary" id="btnConfirmExport" disabled>确认导出</button>
            <button class="btn-secondary" id="btnCancelDiff">返回修改</button>
          </div>
        </div>
        <div class="diff-panels">
          <div class="diff-panel left">
            <h3>源数据</h3>
            <div class="diff-table-wrapper" id="sourceTable"></div>
          </div>
          <div class="diff-panel right">
            <h3>转换后</h3>
            <div class="diff-table-wrapper" id="targetTable"></div>
          </div>
        </div>
      </div>
    </main>

    <aside class="statusbar">
      <div class="status-header">
        <h3>Agent 状态</h3>
      </div>
      <div class="status-steps" id="statusSteps">
        <div class="step pending">
          <span class="step-icon">○</span>
          <span class="step-label">等待文件上传</span>
        </div>
        <div class="step pending">
          <span class="step-icon">○</span>
          <span class="step-label">分析 Schema</span>
        </div>
        <div class="step pending">
          <span class="step-icon">○</span>
          <span class="step-label">生成转换代码</span>
        </div>
        <div class="step pending">
          <span class="step-icon">○</span>
          <span class="step-label">沙箱执行中</span>
        </div>
        <div class="step pending">
          <span class="step-icon">○</span>
          <span class="step-label">生成 Diff 对比</span>
        </div>
        <div class="step pending">
          <span class="step-icon">○</span>
          <span class="step-label">等待导出确认</span>
        </div>
      </div>
    </aside>

    <!-- 异常确认弹窗 -->
    <div class="modal-overlay" id="confirmModal" style="display:none;">
      <div class="modal-box">
        <div class="modal-header">
          <h3>⚠ 发现异常数据</h3>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
          <button class="btn-primary" id="btnAcceptSuggestion">采纳建议</button>
          <button class="btn-secondary" id="btnSkipRow">跳过此行</button>
          <button class="btn-danger" id="btnAbort">终止转换</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
