<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MorphSheet - 跨系统表格数据转换智能体</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div id="app">
    <!-- 左侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header"><h2 class="sidebar-title" id="themeToggle">MorphSheet</h2></div>
      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="history">历史记录</button>
        <button class="tab-btn" data-tab="skills">技能库</button>
      </div>
      <div class="sidebar-content">
        <div class="tab-panel active" id="panel-history"><p class="placeholder-text">暂无转换记录</p></div>
        <div class="tab-panel" id="panel-skills"><p class="placeholder-text">暂无保存的技能</p></div>
      </div>
    </aside>

    <!-- 中间主工作区 -->
    <main class="workspace">
      <div class="top-bar">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon" id="uploadIcon">📂</div>
          <p id="uploadText">拖拽文件到此处，或点击选择</p>
          <p class="upload-hint">支持 .xlsx / .xls / .csv</p>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden>
        </div>
        <div class="target-selector">
          <label>目标格式：</label>
          <select id="targetFormat"><option value="">选择...</option><option value="xlsx">.xlsx</option><option value="xls">.xls</option><option value="csv">.csv</option></select>
          <select id="targetEncoding" style="display:none"><option value="utf-8">UTF-8</option><option value="gbk">GBK</option></select>
        </div>
        <button class="btn-primary" id="btnConvert" disabled>开始转换</button>
      </div>

      <!-- Tab 标签栏 (VS Code 风格) -->
      <div class="main-tab-bar" id="mainTabBar">
        <button class="main-tab active" data-view="chat">💬 对话</button>
        <button class="main-tab" data-view="preview" disabled>📋 源数据</button>
        <button class="main-tab" data-view="diff" disabled>📊 Diff 对比</button>
        <button class="main-tab" data-view="code" disabled>📝 AI 代码</button>
        <div class="tab-spacer"></div>
        <label class="save-skill-label" id="saveSkillLabel" style="display:none">
          <input type="checkbox" id="saveSkillCheck"> 保存为技能
          <input type="text" id="saveSkillName" placeholder="技能名称" style="display:none;width:120px;margin-left:6px;">
        </label>
        <button class="btn-primary btn-sm" id="btnExport" style="display:none">确认导出</button>
        <button class="btn-secondary btn-sm" id="btnCancel" style="display:none">返回修改</button>
      </div>

      <!-- Tab 内容区 -->
      <div class="main-tab-content" id="mainTabContent">
        <!-- 对话 Tab -->
        <div class="tab-view active" id="view-chat">
          <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
              <div class="message system"><div class="message-content">欢迎使用 MorphSheet<br>请上传文件，然后输入清洗指令。</div></div>
            </div>
            <div class="chat-input">
              <input type="text" id="chatInput" placeholder="输入指令，如：1.将日期统一为YYYYMMDD 2.清除电话分隔符..." disabled>
              <button id="btnSend" disabled>发送</button>
              <button id="btnRefresh" class="btn-secondary btn-sm" title="清空对话，重新开始">🔄</button>
            </div>
          </div>
        </div>

        <!-- Diff Tab -->
        <div class="tab-view" id="view-diff">
          <div class="diff-header">
            <span id="diffSummary">数据对比预览</span>
          </div>
          <div class="diff-panels">
            <div class="diff-panel left"><h3>源数据</h3><div class="diff-table-wrapper" id="sourceTable"></div></div>
            <div class="diff-panel right"><h3>转换后</h3><div class="diff-table-wrapper" id="targetTable"></div></div>
          </div>
        </div>

        <!-- File Preview Tab -->
        <div class="tab-view" id="view-preview">
          <div class="diff-panel" style="border:none"><h3>上传文件内容预览 (前20行)</h3><div class="diff-table-wrapper" id="filePreviewTable"></div></div>
        </div>

        <!-- AI Code Tab -->
        <div class="tab-view" id="view-code">
          <div class="code-panel-body-full" id="codePanelBody"></div>
        </div>
      </div>
    </main>

    <!-- 右侧状态栏 -->
    <aside class="statusbar">
      <div class="status-header"><h3>Agent 状态</h3></div>
      <div class="status-steps" id="statusSteps">
        <div class="step pending" data-step="uploaded"><span class="step-icon">○</span><span class="step-label">文件已上传</span></div>
        <div class="step pending" data-step="analyzing"><span class="step-icon">○</span><span class="step-label">分析 Schema</span></div>
        <div class="step pending" data-step="generating"><span class="step-icon">○</span><span class="step-label">生成转换代码</span></div>
        <div class="step pending" data-step="executing"><span class="step-icon">○</span><span class="step-label">沙箱执行中</span></div>
        <div class="step pending" data-step="diffing"><span class="step-icon">○</span><span class="step-label">生成 Diff 对比</span></div>
        <div class="step pending" data-step="awaiting"><span class="step-icon">○</span><span class="step-label">等待导出确认</span></div>
      </div>
      <!-- 脏数据预警区 -->
      <div class="alert-area" id="alertArea" style="display:none">
        <div class="alert-header">⚠ 数据异常</div>
        <div class="alert-list" id="alertList"></div>
        <div class="alert-actions">
          <button class="btn-primary btn-sm" id="alertAccept">采纳建议</button>
          <button class="btn-secondary btn-sm" id="alertChat">继续对话</button>
          <button class="btn-danger btn-sm" id="alertSkip">跳过</button>
        </div>
      </div>
    </aside>

    <!-- 技能详情弹窗 -->
    <div class="modal-overlay" id="skillDetailModal" style="display:none">
      <div class="modal-box">
        <div class="modal-header"><h3 id="skillDetailTitle">技能详情</h3></div>
        <div class="modal-body" id="skillDetailBody"></div>
        <div class="modal-footer">
          <button class="btn-primary" id="btnSkillClose">关闭</button>
        </div>
      </div>
    </div>

    <!-- 异常确认弹窗 -->
    <div class="modal-overlay" id="confirmModal" style="display:none">
      <div class="modal-box">
        <div class="modal-header"><h3>⚠ 发现异常数据</h3></div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
          <button class="btn-primary" id="btnAccept">1. 采纳建议</button>
          <button class="btn-secondary" id="btnChat">2. 继续对话</button>
          <button class="btn-danger" id="btnSkip">3. 跳过此行</button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
